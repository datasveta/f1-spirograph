<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>F1 Spirograph</title>
    <!-- base href resolves sketch.js and SVG relative paths from the p5/ folder -->
    <base href="./p5/">
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/addons/p5.sound.min.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #000;
        color: #fff;
        font-family: 'Georgia', serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
      }

      h1 {
        font-size: 2rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 24px;
        opacity: 0.9;
      }

      canvas {
        display: block;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>Autodromo di Monza</h1>
    <script src="sketch.js"></script>
  </body>
</html>
